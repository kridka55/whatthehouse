<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>WTH Dashboard (Firebase)</title>
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{ --green:#2e9e4f; --green-dark:#1e6e36; --green-soft:#e8f3ec; --ink:#16314f; --muted:#6b7a88; --line:#e3e8ee; --bg:#f4f7f9; --red:#d64545; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:"Prompt","Segoe UI",sans-serif; background:var(--bg); color:var(--ink); }
  header{ background:#fff; border-bottom:1px solid var(--line); padding:13px 18px; position:sticky; top:0; z-index:5; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  header h1{ font-size:1.12rem; margin:0; }
  header .sub{ color:var(--muted); font-size:.78rem; }
  .wrap{ max-width:1000px; margin:0 auto; padding:18px; }
  .btn{ border:0; border-radius:9px; padding:9px 15px; font-family:inherit; font-size:.85rem; cursor:pointer; font-weight:600; }
  .btn-green{ background:var(--green); color:#fff; } .btn-green:hover{ background:var(--green-dark); }
  .btn-ghost{ background:#fff; border:1px solid var(--line); color:var(--ink); }
  /* login */
  .login-wrap{ max-width:380px; margin:9vh auto; padding:16px; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:20px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
  label{ display:block; font-size:.85rem; font-weight:600; margin:12px 0 6px; }
  input{ width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:10px; font-family:inherit; font-size:1rem; }
  .err{ background:#fdecea; color:var(--red); border-radius:9px; padding:10px 13px; font-size:.88rem; font-weight:600; margin-top:12px; display:none; }
  .hide{ display:none !important; }
  /* stats */
  .stats{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:16px; }
  .stat{ background:#fff; border:1px solid var(--line); border-top:3px solid var(--line); border-radius:13px; padding:14px 16px; cursor:pointer; transition:.15s; }
  .stat:hover{ box-shadow:0 2px 8px rgba(0,0,0,.07); transform:translateY(-1px); }
  .stat.active{ box-shadow:0 0 0 2px var(--green-soft); }
  .stat .n{ font-size:1.8rem; font-weight:700; line-height:1; }
  .stat .t{ font-size:.8rem; color:var(--muted); margin-top:6px; }
  .stat.all{ border-top-color:#16314f; } .stat.new{ border-top-color:#ffca28; } .stat.prog{ border-top-color:#3a86ff; } .stat.done{ border-top-color:var(--green); }
  .stat.active.all{ border-color:#16314f; } .stat.active.new{ border-color:#ffca28; } .stat.active.prog{ border-color:#3a86ff; } .stat.active.done{ border-color:var(--green); }
  @media(max-width:640px){ .stats{ grid-template-columns:repeat(2,1fr); } }
  /* analytics */
  .analytics{ background:#fff; border:1px solid var(--line); border-radius:14px; margin-bottom:16px; overflow:hidden; }
  .ana-head{ display:flex; justify-content:space-between; align-items:center; padding:13px 18px; cursor:pointer; font-weight:600; background:#fafcfb; }
  .ana-body{ padding:16px 18px; border-top:1px solid var(--line); }
  .ana-body.hide{ display:none; }
  .kpis{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:16px; }
  .kpi{ background:var(--green-soft); border-radius:11px; padding:14px 16px; }
  .kpi .n{ font-size:1.5rem; font-weight:700; color:var(--green-dark); line-height:1.1; }
  .kpi .t{ font-size:.8rem; color:var(--muted); margin-top:5px; }
  .charts{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .chart-box{ border:1px solid var(--line); border-radius:11px; padding:12px 14px; height:260px; display:flex; flex-direction:column; }
  .chart-box.full{ grid-column:1 / -1; }
  .chart-title{ font-size:.85rem; font-weight:600; margin-bottom:8px; }
  .chart-wrap{ position:relative; flex:1; min-height:0; }
  @media(max-width:640px){ .charts{ grid-template-columns:1fr; } .kpis{ grid-template-columns:1fr; } }
  /* list */
  .filters{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; align-items:center; }
  .filters input{ flex:1; min-width:160px; padding:8px 12px; border:1px solid var(--line); border-radius:9px; font-family:inherit; }
  .count{ color:var(--muted); font-size:.85rem; }
  .alert{ background:#fff8e1; border:1px solid #ffe08a; color:#7a5b00; border-radius:11px; padding:12px 16px; margin-bottom:16px; font-weight:600; }
  .alert.hide{ display:none; }
  .job{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px 18px; margin-bottom:14px; }
  .job.isnew{ border-color:#ffd54f; box-shadow:0 0 0 2px #ffe9a8; }
  .job-top{ display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:flex-start; }
  .cust{ font-size:1.05rem; font-weight:700; }
  .newtag{ background:#ffca28; color:#5a4300; font-size:.66rem; padding:2px 7px; border-radius:20px; margin-left:8px; font-weight:700; }
  .meta{ color:var(--muted); font-size:.83rem; line-height:1.7; margin-top:4px; }
  .prog{ display:flex; gap:6px; margin:16px 0 4px; flex-wrap:wrap; }
  .step{ flex:1; min-width:90px; text-align:center; cursor:pointer; }
  .dot{ height:7px; border-radius:6px; background:var(--line); margin-bottom:6px; }
  .step.done .dot{ background:var(--green); } .step.current .dot{ background:var(--green-dark); }
  .step .lbl{ font-size:.74rem; color:var(--muted); }
  .step.done .lbl,.step.current .lbl{ color:var(--green-dark); font-weight:600; }
  .empty,.loading{ text-align:center; color:var(--muted); padding:40px; }
  .toast{ position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:11px 20px; border-radius:10px; font-size:.85rem; opacity:0; transition:.3s; pointer-events:none; z-index:20; }
  .toast.show{ opacity:1; }
  .spin{ display:inline-block; width:14px; height:14px; border:2px solid currentColor; border-top-color:transparent; border-radius:50%; animation:s .7s linear infinite; vertical-align:middle; }
  @keyframes s{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="loginView">
  <div class="login-wrap">
    <div class="card">
      <div style="text-align:center;font-weight:700;font-size:1.1rem">WHAT THE HOUSE</div>
      <div class="sub" style="text-align:center;color:var(--muted)">Dashboard แอดมิน</div>
      <label>อีเมล</label>
      <input id="email" type="email" placeholder="admin@whatthehouse.app" autocomplete="username">
      <label>รหัสผ่าน</label>
      <input id="pwd" type="password" placeholder="รหัสผ่าน" autocomplete="current-password">
      <div style="height:16px"></div>
      <button class="btn btn-green" id="loginBtn" style="width:100%;padding:13px" onclick="doLogin()">เข้าสู่ระบบ</button>
      <div class="err" id="loginErr"></div>
    </div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="appView" class="hide">
  <header>
    <div><h1>📋 Dashboard งานตรวจบ้าน</h1><div class="sub">WHAT THE HOUSE • Firebase</div></div>
    <div style="display:flex;gap:8px;align-items:center">
      <span class="sub" id="whoEmail"></span>
      <button class="btn btn-ghost" onclick="logout()">ออกจากระบบ</button>
    </div>
  </header>
  <div class="wrap">
    <div class="alert hide" id="newAlert"></div>
    <div class="stats" id="stats"></div>

    <div class="analytics" id="analytics">
      <div class="ana-head" onclick="toggleAna()"><span>📊 สถิติภาพรวม</span><span id="anaToggle">▲</span></div>
      <div class="ana-body" id="anaBody">
        <div class="kpis" id="kpis"></div>
        <div class="charts">
          <div class="chart-box full"><div class="chart-title">งานเข้าตามวัน</div><div class="chart-wrap"><canvas id="chartTime"></canvas></div></div>
          <div class="chart-box"><div class="chart-title">แยกตามประเภททรัพย์</div><div class="chart-wrap"><canvas id="chartType"></canvas></div></div>
          <div class="chart-box"><div class="chart-title">แยกตามพื้นที่/จังหวัด</div><div class="chart-wrap"><canvas id="chartArea"></canvas></div></div>
        </div>
      </div>
    </div>

    <div class="filters">
      <input id="search" placeholder="🔍 ค้นหาชื่อลูกค้า / โครงการ / เบอร์โทร" oninput="render()">
      <span class="count" id="count"></span>
    </div>
    <div id="list"><div class="loading"><span class="spin" style="color:#2e9e4f"></span> กำลังโหลด...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../assets/js/firebase-init.js"></script>
<script>
  var STAGES = ['จองคิว','นัดหมาย','ตรวจหน้างาน','จัดทำรายงาน','ส่งรายงาน/เสร็จสิ้น'];
  var JOBS = [];
  var FILTER = 'all';
  var anaOpen = true;
  var charts = {};
  var unsub = null;

  function $(id){ return document.getElementById(id); }
  function esc(s){ return String(s||'').replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
  var tT; function toast(m){ var t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(tT); tT=setTimeout(function(){ t.classList.remove('show'); },2600); }

  /* ---------- AUTH ---------- */
  firebase.auth().onAuthStateChanged(function(user){
    if(user){ enterApp(user); } else { leaveApp(); }
  });
  function doLogin(){
    var email=$('email').value.trim(), pwd=$('pwd').value;
    $('loginErr').style.display='none';
    var b=$('loginBtn'); b.disabled=true; b.innerHTML='<span class="spin"></span> กำลังเข้า...';
    firebase.auth().signInWithEmailAndPassword(email,pwd)
      .then(function(){ b.disabled=false; b.textContent='เข้าสู่ระบบ'; })
      .catch(function(e){
        b.disabled=false; b.textContent='เข้าสู่ระบบ';
        var msg = (e.code==='auth/invalid-credential'||e.code==='auth/wrong-password'||e.code==='auth/user-not-found') ? 'อีเมลหรือรหัสผ่านไม่ถูกต้อง' : (e.message||'เข้าไม่สำเร็จ');
        $('loginErr').textContent=msg; $('loginErr').style.display='block';
      });
  }
  function logout(){ if(unsub){ unsub(); unsub=null; } firebase.auth().signOut(); }

  function enterApp(user){
    $('whoEmail').textContent=user.email;
    $('loginView').classList.add('hide'); $('appView').classList.remove('hide');
    listen();
  }
  function leaveApp(){
    $('appView').classList.add('hide'); $('loginView').classList.remove('hide');
    $('email').value=''; $('pwd').value='';
  }

  /* ---------- REALTIME DATA ---------- */
  function listen(){
    if(unsub) unsub();
    unsub = firebase.firestore().collection('bookings').orderBy('createdAt','desc')
      .onSnapshot(function(snap){
        JOBS = snap.docs.map(function(d){ var x=d.data(); x.id=d.id; return x; });
        render(); renderAnalytics();
      }, function(err){ $('list').innerHTML='<div class="empty">โหลดไม่สำเร็จ: '+esc(err.message)+'</div>'; });
  }

  function bookedDate(j){ try{ return j.createdAt && j.createdAt.toDate ? j.createdAt.toDate() : null; }catch(e){ return null; } }
  function fmt(d){ if(!d) return '-'; return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2)+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); }

  /* ---------- STATS + FILTER ---------- */
  function setFilter(f){ FILTER=(FILTER===f && f!=='all')?'all':f; render(); }
  function statCard(key,label,n){ return '<div class="stat '+key+(FILTER===key?' active':'')+'" onclick="setFilter(\''+key+'\')"><div class="n">'+n+'</div><div class="t">'+label+'</div></div>'; }

  function render(){
    var q=($('search').value||'').toLowerCase().trim();
    var first=STAGES[0], last=STAGES[STAGES.length-1];
    var total=JOBS.length;
    var cNew=JOBS.filter(function(j){return j.status===first;}).length;
    var cDone=JOBS.filter(function(j){return j.status===last;}).length;
    var cProg=total-cNew-cDone;
    $('stats').innerHTML = statCard('all','งานทั้งหมด',total)+statCard('new','รอเริ่ม (ใหม่)',cNew)+statCard('prog','กำลังดำเนินการ',cProg)+statCard('done','เสร็จแล้ว',cDone);

    var al=$('newAlert');
    if(cNew>0){ al.classList.remove('hide'); al.innerHTML='🔔 มีงานจองใหม่รอดำเนินการ <b>'+cNew+'</b> งาน'; } else al.classList.add('hide');

    var rows=JOBS.filter(function(j){
      if(FILTER==='new'&&j.status!==first) return false;
      if(FILTER==='done'&&j.status!==last) return false;
      if(FILTER==='prog'&&(j.status===first||j.status===last)) return false;
      if(!q) return true;
      return ((j.name||'')+' '+(j.project||'')+' '+(j.phone||'')+' '+(j.area||'')).toLowerCase().indexOf(q)>-1;
    });
    var lbl={all:'ทั้งหมด',new:'งานใหม่',prog:'กำลังดำเนินการ',done:'เสร็จแล้ว'}[FILTER];
    $('count').textContent=lbl+' '+rows.length+' งาน';

    if(rows.length===0){ $('list').innerHTML='<div class="empty">ยังไม่มีงาน</div>'; return; }
    $('list').innerHTML = rows.map(function(j){
      var idx=STAGES.indexOf(j.status); if(idx<0) idx=0;
      var isNew=j.status===first;
      var steps=STAGES.map(function(st,i){
        var cls=i<idx?'done':(i===idx?'current':'');
        return '<div class="step '+cls+'" onclick="setStatus(\''+j.id+'\','+i+')" title="ตั้งเป็นขั้นนี้"><div class="dot"></div><div class="lbl">'+esc(st)+'</div></div>';
      }).join('');
      var contact=[];
      if(j.phone) contact.push('📞 '+esc(j.phone));
      if(j.email) contact.push('✉️ '+esc(j.email));
      if(j.type) contact.push(esc(j.type));
      if(j.area) contact.push('📍 '+esc(j.area));
      if(j.date) contact.push('🗓️ '+esc(j.date));
      return '<div class="job '+(isNew?'isnew':'')+'">'+
        '<div class="job-top"><div>'+
          '<div class="cust">'+esc(j.name||'(ไม่มีชื่อ)')+(isNew?'<span class="newtag">ใหม่</span>':'')+'</div>'+
          '<div class="meta">'+(j.project?'<b>'+esc(j.project)+'</b><br>':'')+contact.join(' &nbsp;·&nbsp; ')+(j.message?'<br>📝 '+esc(j.message):'')+'</div>'+
        '</div><div style="text-align:right"><div class="meta">จองเมื่อ '+esc(fmt(bookedDate(j)))+'</div></div></div>'+
        '<div class="prog">'+steps+'</div>'+
      '</div>';
    }).join('');
  }

  function setStatus(id, stageIdx){
    var status=STAGES[stageIdx];
    firebase.firestore().collection('bookings').doc(id).update({
      status: status, updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(function(){ toast('อัปเดตสถานะเป็น "'+status+'"'); })
      .catch(function(e){ toast('ผิดพลาด: '+(e.message||e)); });
  }

  /* ---------- ANALYTICS ---------- */
  function toggleAna(){ anaOpen=!anaOpen; $('anaBody').classList.toggle('hide',!anaOpen); $('anaToggle').textContent=anaOpen?'▲':'▼'; if(anaOpen) renderAnalytics(); }
  var palette=['#2e9e4f','#3a86ff','#ffca28','#ff6b6b','#9b5de5','#00bbf9','#f15bb5','#fb8500'];
  function drawChart(id,type,labels,data,lbl,color){
    var ctx=$(id); if(!ctx||typeof Chart==='undefined') return;
    if(charts[id]) charts[id].destroy();
    charts[id]=new Chart(ctx,{ type:type, data:{ labels:labels, datasets:[{ label:lbl, data:data, backgroundColor:(type==='doughnut'?palette:(color||'#2e9e4f')), borderRadius:(type==='bar'?6:0) }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:type==='doughnut', position:'bottom' } }, scales:(type==='doughnut'?{}:{ y:{ beginAtZero:true, ticks:{ precision:0 } } }) } });
  }
  function renderAnalytics(){
    if(!anaOpen) return;
    if(typeof Chart==='undefined') return setTimeout(renderAnalytics,400);
    var last=STAGES[STAGES.length-1];
    var doneJobs=JOBS.filter(function(j){return j.status===last;});
    var durs=[];
    doneJobs.forEach(function(j){ var a=bookedDate(j); var b=(j.updatedAt&&j.updatedAt.toDate)?j.updatedAt.toDate():null; if(a&&b&&b>=a) durs.push((b-a)/86400000); });
    var avg=durs.length?(durs.reduce(function(s,x){return s+x;},0)/durs.length):null;
    var rate=JOBS.length?Math.round(doneJobs.length/JOBS.length*100):0;
    $('kpis').innerHTML='<div class="kpi"><div class="n">'+(avg!==null?avg.toFixed(1)+' วัน':'—')+'</div><div class="t">เวลาเฉลี่ยต่องาน (จองคิว → เสร็จ)</div></div>'+
      '<div class="kpi"><div class="n">'+rate+'%</div><div class="t">อัตราปิดงาน ('+doneJobs.length+'/'+JOBS.length+' งาน)</div></div>';
    var byDay={},byType={},byArea={};
    JOBS.forEach(function(j){ var d=bookedDate(j); if(d){ var k=d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); byDay[k]=(byDay[k]||0)+1; }
      var t=(j.type&&String(j.type).trim())||'ไม่ระบุ'; byType[t]=(byType[t]||0)+1;
      var a=(j.area&&String(j.area).trim())||'ไม่ระบุ'; byArea[a]=(byArea[a]||0)+1; });
    var days=Object.keys(byDay).sort();
    drawChart('chartTime','bar',days,days.map(function(k){return byDay[k];}),'งานเข้า','#2e9e4f');
    drawChart('chartType','doughnut',Object.keys(byType),Object.keys(byType).map(function(k){return byType[k];}),'ประเภท',null);
    drawChart('chartArea','bar',Object.keys(byArea),Object.keys(byArea).map(function(k){return byArea[k];}),'พื้นที่','#3a86ff');
  }
</script>
</body>
</html>
