<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<base target="_top">
<style>
  :root{ --green:#2e9e4f; --green-dark:#1e6e36; --green-soft:#e8f3ec; --ink:#16314f; --muted:#6b7a88; --line:#e3e8ee; --bg:#f4f7f9; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:"Prompt","Segoe UI",sans-serif; background:var(--bg); color:var(--ink); }
  header{ background:#fff; border-bottom:1px solid var(--line); padding:14px 18px; position:sticky; top:0; z-index:5; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  header h1{ font-size:1.15rem; margin:0; }
  header .sub{ color:var(--muted); font-size:.8rem; }
  .wrap{ max-width:1000px; margin:0 auto; padding:18px; }
  .btn{ border:0; border-radius:9px; padding:8px 14px; font-family:inherit; font-size:.85rem; cursor:pointer; font-weight:600; }
  .btn-green{ background:var(--green); color:#fff; }
  .btn-ghost{ background:#fff; border:1px solid var(--line); color:var(--ink); }
  .btn-green:hover{ background:var(--green-dark); }
  .alert{ background:#fff8e1; border:1px solid #ffe08a; color:#7a5b00; border-radius:11px; padding:12px 16px; margin-bottom:16px; font-weight:600; display:flex; align-items:center; gap:8px; }
  .alert.hide{ display:none; }
  .filters{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; align-items:center; }
  .filters input{ flex:1; min-width:160px; padding:8px 12px; border:1px solid var(--line); border-radius:9px; font-family:inherit; }
  .count{ color:var(--muted); font-size:.85rem; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px 18px; margin-bottom:14px; box-shadow:0 1px 3px rgba(0,0,0,.03); }
  .card.isnew{ border-color:#ffd54f; box-shadow:0 0 0 2px #ffe9a8; }
  .card-top{ display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:flex-start; }
  .cust{ font-size:1.05rem; font-weight:700; }
  .newtag{ background:#ffca28; color:#5a4300; font-size:.66rem; padding:2px 7px; border-radius:20px; margin-left:8px; vertical-align:middle; font-weight:700; }
  .meta{ color:var(--muted); font-size:.83rem; line-height:1.7; margin-top:4px; }
  .meta a{ color:var(--green-dark); }
  .jobid{ color:var(--muted); font-size:.72rem; font-family:monospace; }
  /* progress */
  .prog{ display:flex; gap:6px; margin:16px 0 6px; flex-wrap:wrap; }
  .step{ flex:1; min-width:90px; text-align:center; cursor:pointer; }
  .dot{ height:7px; border-radius:6px; background:var(--line); margin-bottom:6px; transition:.2s; }
  .step.done .dot{ background:var(--green); }
  .step.current .dot{ background:var(--green-dark); }
  .step .lbl{ font-size:.74rem; color:var(--muted); }
  .step.done .lbl, .step.current .lbl{ color:var(--green-dark); font-weight:600; }
  .step:hover .dot{ opacity:.7; }
  .actions{ display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; padding-top:14px; border-top:1px solid var(--line); }
  .loading,.empty{ text-align:center; color:var(--muted); padding:40px; }
  .toast{ position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:11px 20px; border-radius:10px; font-size:.85rem; opacity:0; transition:.3s; pointer-events:none; z-index:20; }
  .toast.show{ opacity:1; }
  .spin{ display:inline-block; width:14px; height:14px; border:2px solid #fff; border-top-color:transparent; border-radius:50%; animation:s .7s linear infinite; vertical-align:middle; }
  @keyframes s{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div>
    <h1>📋 Dashboard งานตรวจบ้าน</h1>
    <div class="sub" id="bizName">WHAT THE HOUSE</div>
  </div>
  <button class="btn btn-ghost" onclick="load()">🔄 รีเฟรช</button>
</header>

<div class="wrap">
  <div class="alert hide" id="newAlert"></div>

  <div class="filters">
    <input id="search" placeholder="🔍 ค้นหาชื่อลูกค้า / โครงการ / เบอร์โทร" oninput="render()">
    <span class="count" id="count"></span>
  </div>

  <div id="list"><div class="loading"><span class="spin"></span> กำลังโหลดงาน...</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
  var STAGES = [];
  var JOBS = [];

  function load(){
    document.getElementById('list').innerHTML = '<div class="loading"><span class="spin"></span> กำลังโหลดงาน...</div>';
    google.script.run.withSuccessHandler(function(res){
      STAGES = res.stages; JOBS = res.jobs;
      document.getElementById('bizName').textContent = res.business || 'WHAT THE HOUSE';
      render();
    }).withFailureHandler(function(err){
      document.getElementById('list').innerHTML = '<div class="empty">โหลดไม่สำเร็จ: ' + err + '</div>';
    }).apiGetJobs();
  }

  function esc(s){ return String(s||'').replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

  function render(){
    var q = (document.getElementById('search').value || '').toLowerCase().trim();
    var firstStage = STAGES[0];
    var lastStage = STAGES[STAGES.length-1];

    // แจ้งเตือนงานจองใหม่ (ยังอยู่ขั้นแรก)
    var newCount = JOBS.filter(function(j){ return j.status === firstStage; }).length;
    var al = document.getElementById('newAlert');
    if(newCount > 0){ al.classList.remove('hide'); al.innerHTML = '🔔 มีงานจองใหม่รอดำเนินการ <b>' + newCount + '</b> งาน'; }
    else{ al.classList.add('hide'); }

    var rows = JOBS.filter(function(j){
      if(!q) return true;
      return (j.name + ' ' + j.project + ' ' + j.phone + ' ' + j.area).toLowerCase().indexOf(q) > -1;
    });
    document.getElementById('count').textContent = 'ทั้งหมด ' + rows.length + ' งาน';

    if(rows.length === 0){ document.getElementById('list').innerHTML = '<div class="empty">ยังไม่มีงาน</div>'; return; }

    document.getElementById('list').innerHTML = rows.map(function(j){
      var idx = STAGES.indexOf(j.status); if(idx < 0) idx = 0;
      var isNew = j.status === firstStage;
      var isDone = j.status === lastStage;

      var steps = STAGES.map(function(st, i){
        var cls = i < idx ? 'done' : (i === idx ? 'current' : '');
        return '<div class="step ' + cls + '" onclick="setStatus(\'' + j.jobId + '\',' + i + ')" title="ตั้งเป็นขั้นนี้">' +
               '<div class="dot"></div><div class="lbl">' + esc(st) + '</div></div>';
      }).join('');

      var contact = [];
      if(j.phone) contact.push('📞 ' + esc(j.phone));
      if(j.email) contact.push('✉️ ' + esc(j.email));
      if(j.type) contact.push(esc(j.type));
      if(j.area) contact.push('📍 ' + esc(j.area));
      if(j.date) contact.push('🗓️ ต้องการตรวจ ' + esc(j.date));

      var doneBtn = isDone
        ? '<span class="count">✓ ส่งงานแล้ว</span>'
        : '<button class="btn btn-green" onclick="sendDone(\'' + j.jobId + '\', this)">✉️ ส่งอีเมลแจ้งลูกค้าว่าเสร็จแล้ว</button>';

      return '<div class="card ' + (isNew ? 'isnew' : '') + '">' +
        '<div class="card-top"><div>' +
          '<div class="cust">' + esc(j.name) + (isNew ? '<span class="newtag">ใหม่</span>' : '') + '</div>' +
          '<div class="meta">' + (j.project ? '<b>' + esc(j.project) + '</b><br>' : '') + contact.join(' &nbsp;·&nbsp; ') +
            (j.message ? '<br>📝 ' + esc(j.message) : '') + '</div>' +
        '</div><div style="text-align:right">' +
          '<div class="jobid">' + esc(j.jobId) + '</div>' +
          '<div class="meta">จองเมื่อ ' + esc(j.booked) + '</div>' +
        '</div></div>' +
        '<div class="prog">' + steps + '</div>' +
        '<div class="actions">' +
          '<a class="btn btn-ghost" href="' + esc(j.folderUrl) + '" target="_blank">📁 เปิดโฟลเดอร์ Drive (อัปไฟล์)</a>' +
          doneBtn +
        '</div>' +
      '</div>';
    }).join('');
  }

  function setStatus(jobId, stageIdx){
    var status = STAGES[stageIdx];
    var job = JOBS.filter(function(j){ return j.jobId === jobId; })[0];
    if(job) job.status = status; // อัปเดตหน้าจอทันที
    render();
    google.script.run.withSuccessHandler(function(){ toast('อัปเดตสถานะเป็น "' + status + '"'); })
      .withFailureHandler(function(e){ toast('ผิดพลาด: ' + e); load(); })
      .apiUpdateStatus(jobId, status);
  }

  function sendDone(jobId, btn){
    if(!confirm('ส่งอีเมลแจ้งลูกค้าว่างานเสร็จแล้ว และตั้งสถานะเป็นขั้นสุดท้าย?')) return;
    var old = btn.innerHTML; btn.innerHTML = '<span class="spin"></span> กำลังส่ง...'; btn.disabled = true;
    google.script.run.withSuccessHandler(function(res){
      if(res.ok){ toast('✓ ส่งอีเมลถึงลูกค้าแล้ว'); load(); }
      else{ toast('ส่งไม่สำเร็จ: ' + res.error); btn.innerHTML = old; btn.disabled = false; }
    }).withFailureHandler(function(e){ toast('ผิดพลาด: ' + e); btn.innerHTML = old; btn.disabled = false; })
      .apiSendDone(jobId);
  }

  var toastTimer;
  function toast(msg){
    var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer); toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2600);
  }

  load();
</script>
</body>
</html>
